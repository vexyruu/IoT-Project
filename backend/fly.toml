# fly.toml app configuration file generated for iot-project on 2026-03-18T20:14:45+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iot-project'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'flights_data'
  destination = '/data'

[env]
  DB_PATH = '/data/flights.db'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
